---
version: "3"

services:

  homepage:
    container_name: homepage
    restart: unless-stopped
    build: .
      # ports:
      # - 3000:3000
    volumes:
      - /data/virt/docker/homepage:/app/config
        #- /data/virt/docker/docker-composies/dashboard/config/bookmarks.yaml
        #- /data/virt/docker/docker-composies/dashboard/config/services.yaml
        #- /data/virt/docker/docker-composies/dashboard/config/settings.yaml
        #- /data/virt/docker/docker-composies/dashboard/config/widgets.yaml

        # Nas mounts for storage monitoring
      - /data/backup:/data/backup:ro
      - /data/repo:/data/repo:ro
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.homepage.entrypoints=web"
      - "traefik.http.routers.homepage.rule=Host(`homepage.localdomain`)"
      - "traefik.http.routers.homepage.service=homepage"
      - "traefik.http.services.homepage.loadBalancer.server.port=3000"
    env_file:
      - .secrets.env

networks:
  default:
    name: traefik-network
    external: true
