---
version: "3"

services:

  # Make sure portmapper isn't running on host
  nfs-server:
    image: erichough/nfs-server
    container_name: nfs-server
    restart: unless-stopped
      # network_mode: host
    ports:
      - 2049:2049
      - 2049:2049/udp
        # - 111:111
        # - 111:111/udp
        # - 32765:32765
        # - 32765:32765/udp
        # - 32767:32767
        # - 32767:32767/udp
    cap_add:
      - SYS_ADMIN
      - SYS_MODULE
    volumes:
      - /opt/nas/exports:/etc/exports:ro # Generated by nas-mk2 ansible
      - /lib/modules:/lib/modules:ro
      - /data/:/data/
    # environment:
      # - NFS_LOG_LEVEL=DEBUG
    security_opt:
      # If on debian, need to allow container through apparmor:
      - apparmor=docker-nfs

  samba-server:
    image: ghcr.io/servercontainers/samba
    container_name: samba-server
    restart: unless-stopped
    network_mode: host
    cap_add:
      - CAP_NET_ADMIN
    volumes:
      - "/data/repo/:/share/repo/"
      - "/root/smb.conf:/etc/smb.conf" # Generate smb.conf on host from ansible
